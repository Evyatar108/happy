nual not Cherry-pick (we collapsed it post-merge). After commit, bump the lastRanAt timestamp for happy-upstream-sync in plans/overview-data.js (find the task entry with id='happy-upstream-sync' in OVERVIEW_DATA.tasks[] and update its runs[] / periodic.lastRanAt to today's date)."`}},{id:"codex-upstream-rebase",scope:"codex",phase:"plan-ready",status:"ok",lastTouchedAt:"2026-05-14T01:30:00Z",kanbanCards:[],command:{name:"codex-upstream-rebase",descriptionHtml:"Periodic \u2014 rebase codex submodule on openai/codex upstream",warnings:[],planPrompt:`/plan-with-ralph "Run the codex-submodule upstream rebase. The procedure lives in the codex submodule itself: codex/.claude/commands/rebase-upstream.md and codex/.claude/commands/sync-upstream.md (read both end-to-end before starting). Workflow: cd into a worktree of the codex submodule at .ralph/jobs/<job-name>/codex-worktree/ pointed at gim-home/codex's main (don't edit the parent codexu checkout's submodule directly \u2014 minimize-conflict-surface tenet from plans/codexu-roadmap.md). Run the subtree pull from openai/codex per the codex submodule's sync-upstream skill. Resolve conflicts between upstream and our overlay crates (codex-rs-overlay/codex-copilot, codex-copilot-launcher, codex-invariant-tests). Run cargo build --workspace from inside codex/external/repos/codex-patched/codex-rs to verify. Commit on a topic branch IN THE SUBMODULE; push to gim-home/codex; then in this codexu repo bump the submodule pointer as a SEPARATE commit on codexu main. After commit, bump the lastRanAt timestamp for codex-upstream-rebase in plans/overview-data.js (find the task entry with id='codex-upstream-rebase' in OVERVIEW_DATA.tasks[] and update its runs[] / periodic.lastRanAt to today's date). Surface to operator if openai/codex has a major-version upstream bump or if overlay crates need API-shape changes to match new upstream \u2014 those are escalations, not routine sync work."`}},{id:"agent-view-research",scope:"codexu",phase:"shipped",status:"ok",lastTouchedAt:"2026-05-14T06:00:00Z",kanbanCards:[],command:{name:"agent-view-research",descriptionHtml:"Research Claude Code's `agent view` feature \u2192 `plans/agent-view-research.md` + 6 follow-up tasks (agent-tree-rpc, session-parent-link, mobile-tree-view, session-role-pill, spawn-from-app, agent-status-stream)",warnings:[],planPrompt:`/plan-with-ralph "Research Claude Code's 'agent view' feature (released recently). Output: a research doc at plans/agent-view-research.md that covers: (1) what the feature IS \u2014 how it presents agents, what UI affordances it gives, what spawning model it uses, what state it persists, what permissions / scoping it enforces; (2) where it lives in Claude Code (file paths, schema, RPC surface) \u2014 read the relevant source if accessible from C:/harness-efforts/claude-code/worktrees/main; (3) how it differs from codex's existing multi_agents_v2/spawn.rs and codex's [agents.<role>] TOML world (read codex/external/repos/codex-patched/codex-rs/multi_agents_v2/spawn.rs as reference \u2014 READ-ONLY per the minimize-conflict-surface tenet in plans/codexu-roadmap.md); (4) what concepts we'd want to bring to codexu: spawning model, state, persistence, communication, plugin-scoping; (5) what concepts we'd want to bring to the HAPPY/CODEXU MOBILE APP UI \u2014 today the app shows a flat list of sessions, but agent view might surface a richer model (agent roles visible per session, spawn relationships drawn as a tree, parent-child status rolled up, ability to spawn-a-named-agent from the app). Read packages/happy-app/sources/app/(app)/index.tsx for the current session-list surface and packages/happy-app/CLAUDE.md for the sync invariants the app honors. Output for each finding: whether it applies to (a) codex agent runtime, (b) codexu mobile app UI, or (c) both \u2014 different fix-sites have different package targets. Output: the doc + a decomposition into follow-up ralph tasks with file:line refs and effort estimates per applicability bucket. NO CODE CHANGES \u2014 research-only. Add new task entries to plans/parallel-assignments.md and plans/overview-data.js (append to OVERVIEW_DATA.tasks[]) for each follow-up that emerges from the research, AND set spawnedFrom='agent-view-research' on each new task's entry in plans/overview-data.js so the spawn relationship is captured. Cross-reference plans/codexu-roadmap.md \xA7Phase 6 'Long-lived teammates' since this feature likely overlaps. Surface to operator before opening any follow-up code task \u2014 the research output is itself the deliverable."`},planOnly:!0},{id:"plugin-scope-agents",scope:"codex|codexu",phase:"plan-ready",status:"ok",lastTouchedAt:"2026-05-14T03:00:00Z",kanbanCards:[{column:"blocked",cardClass:null,inlineStyle:null,html:`

ma lives in codex/external/repos/codex-patched/codex-rs/core-plugins/src/manifest.rs (READ-ONLY). Acceptance: ralph-orchestration plugin manifest declares scope=top-level; spawning a subagent that tries to load it fails or silently no-ops; spawning via the new agent-spawner succeeds and the new session sees ralph-orchestration. Tests: codex integration test with mock plugin in both scopes. Cross-package typecheck green. Surface to operator before merging \u2014 this changes the plugin-loading contract."`}},{id:"agent-comms",scope:"codexu",phase:"plan-ready",status:"blocked",lastTouchedAt:"2026-05-14T03:00:00Z",kanbanCards:[{column:"blocked",cardClass:null,inlineStyle:null,html:`

      <div class="card-meta">

    `,order:70}],command:{name:"agent-comms",descriptionHtml:"Top-level agent \u2194 top-level agent comms across 3 scopes (cross-tunnel / same-daemon / parent-child)",warnings:[{className:"cmd-warn blocked",html:`\u{1F512} Blocked on <code>plugin-scope-agents</code> + <code>agent-view-research</code> + <code>channels-research</code> landing. The communication channel design depends on the spawner pattern's chosen model AND on whether MCP "channels" (2-way) are available as the transport.`}],planPrompt:`/plan-with-ralph "Build top-level-agent \u2194 top-level-agent communication across THREE distinct scopes \u2014 design has to decide whether to unify them under one transport or distinguish them with different mechanisms.

Scope A \u2014 Cross-tunnel / cross-machine (codexu-specific). Two top-level sessions live on different daemons (e.g., laptop daemon + remote machine daemon, both paired to the same operator's GitHub identity). Today daemons are silo'd (single-user-per-process embedded happy-server per Sprint A); no cross-daemon routing exists. This is the hardest scope because there's no existing routing layer. Options: (i) re-introduce a relay (we explicitly deleted this \u2014 operator policy); (ii) use Microsoft Dev Tunnels as a P2P channel between daemons; (iii) operator's mobile app acts as the rendezvous broker. Surface this choice to operator BEFORE designing the wire shape.

Scope B \u2014 Same-machine, daemon-managed. Two top-level sessions on ONE daemon. Daemon already coordinates via Socket.IO event-routing (packages/happy-server/sources/app/events/eventRouter.ts). The cross-session message-pass would extend that with a per-session inbox + a tool the agent invokes. This is the easiest scope.

Scope C \u2014 Parent-spawned-child relationship. An agent-spawner (from plugin-scope-agents) spawned the child top-level session; the parent retains a 'session reference' or capability. Communication has implicit trust + a known channel from spawn time. Could be a strict subset of B/A but with stronger invariants (e.g., parent can read child's logs/state; child can post back to parent's inbox without explicit handshake).

The design must answer: are these three separate mechanisms (different MCP servers / RPC surfaces per scope), one unified transport with scope-aware routing (single MCP with a 'scope' parameter), or a spectrum (parent-child piggybacks on B; B uses daemon Socket.IO; A needs the explicit cross-daemon design)?

Two consumer-facing channels to cover regardless of scope: (1) SPAWNING \u2014 request another top-level agent be spawned with role/cwd/plugins; (2) MESSAGE PASSING \u2014 request-response or pub-sub between live sessions.

Read plans/agent-view-research.md, plans/channels-research.md, plans/agent-view-followups.md if exists, codex/external/repos/codex-patched/codex-rs/multi_agents_v2/ for codex's existing inter-agent plumbing (READ-ONLY per minimize-conflict-surface). Read packages/happy-cli/src/api/apiMachine.ts + apiSession.ts for how spawn-happy-session is currently exposed; the agent-comms MCP likely lives in happy-cli. Read packages/happy-server/sources/app/events/eventRouter.ts for the existing fan-out primitive that Scope B would extend.

Acceptance: design doc + per-scope working fixture: (B) two sessions on the same daemon exchange a message; (C) a spawned child reports back to its parent without re-handshake; (A) the design names a concrete transport choice for cross-daemon (no full implementation required for the first pass). Tests: vitest fixture for each scope. Pitfall: cycle-prevention applies across scopes (A spawns B spawns A \u2192 loop); need hop counter + operator-approval gate. Surface ARCHITECTURAL CHOICES (relay-vs-P2P-vs-broker, unified-vs-separate transports) to operator BEFORE landing code."`}},{id:"channels-research",scope:"codexu",phase:"shipped",status:"ok",lastTouchedAt:"2026-05-14T09:00:00Z",kanbanCards:[],command:{name:"channels-research",descriptionHtml:'Research Claude Code\'s `channels` (MCP 2-way) + codex implementation plan \xB7 doc <a href="channels-research.md">channels-research.md</a> \xB7 2 follow-ups (mcp-server-notifications, codex-channels)',warnings:[],planPrompt:"/plan-with-ralph \"Research Claude Code's 'channels' concept and design a codex equivalent if it doesn't exist there. Goal: 2-way communication between agents and MCP servers (today MCP is largely request-response from the agent; we want the MCP to be able to push messages back / stream state changes / interrupt the agent). Output: plans/channels-research.md covering: (1) What Claude Code calls 'channels' \u2014 read the relevant Claude Code source (C:/harness-efforts/claude-code/worktrees/main/ if accessible) + Anthropic's docs/changelog. Capture the wire shape, lifecycle (open/close), back-pressure model, how an MCP server discovers/registers a channel, how the agent subscribes. (2) Codex's current MCP support \u2014 `codex` ships an MCP client; what does it support today? Read codex/external/repos/codex-patched/codex-rs/ (READ-ONLY per minimize-conflict-surface tenet) for mcp_tool_call.rs / mcp_client / rmcp_client modules. Identify whether codex's MCP transport (stdio? sse? streamable-http? something else?) admits server-initiated messages. (3) Gap analysis: if codex doesn't support 2-way channels, what's the minimal patch? An overlay crate in codex/codex-rs-overlay/ that extends mcp_client with channel semantics? A new tool type? A protocol upgrade? (4) Implementation sketch: file:line refs for where the patches would land, effort estimate, risk areas. (5) Cross-reference Phase 2d (ask_user_question primitive) and the MCP spec evolution (https://spec.modelcontextprotocol.io/) \u2014 channels might already be standardized. NO CODE \u2014 research + design only. Add follow-up ralph task entries to plans/parallel-assignments.md if the gap analysis surfaces concrete next steps. Surface to operator before committing the doc.\""},planOnly:!0},{id:"async-events-design",scope:"codexu",phase:"plan-ready",status:"blocked",lastTouchedAt:"2026-05-14T13:30:00Z",kanbanCards:[],command:{name:"async-events-design",descriptionHtml:"Design async event listening for agents \u2014 re-blocked 2026-05-14 to wait for channels primitive before locking v1 transport",warnings:[{className:"cmd-warn blocked",html:"\u{1F512} Re-blocked 2026-05-14. Was briefly run \u2014 its draft (working tree only at <code>plans/async-events-design.md</code>) recommends long-poll MCP for v1 and channels-research's notification bridge as fast-follow. Operator decided the design should be informed by an actually-landed channels primitive (Stage A \u2014 <code>mcp-server-notifications</code>) before locking the v1 transport. Resume after that ships. Working-tree draft is preserved as a starting point."}],planPrompt:`/plan-with-ralph "Design how an agent listens to async events \u2014 e.g., 'wake me when a commit lands on main', 'notify me when a periodic task fires', 'tell me when another agent finishes its turn'. Today an agent's only async-trigger model is: exit and be re-spawned (e.g., a periodic background task that exits to wake the operator/agent). That's not ideal \u2014 loses context, restart latency, can't subscribe to fine-grained events. Output: plans/async-events-design.md covering: (1) The use cases \u2014 at least these 4: git events (commit on main / branch updated / push), periodic-task firings, inter-agent notifications (sibling-agent completion / sibling-agent question), file-system events (file changed under cwd). (2) Current options in Claude Code \u2014 is there a 'wait for X' tool? hooks? streamable MCP? A 'send-when-idle' channel? Read C:/harness-efforts/claude-code/worktrees/main/ if accessible. (3) Current options in codex \u2014 codex's hook system (config/src/hook_config.rs), inter-agent fast path in multi_agents_v2/, MCP support. READ-ONLY on codex/external/repos/codex-patched/ per minimize-conflict-surface. (4) Design options for codexu \u2014 compare at least: (a) MCP with 2-way channels (depends on channels-research outcome); (b) periodic background task that exits to wake agent (current model \u2014 note limits); (c) long-poll MCP tool (block until event); (d) a 'subscription' RPC on the codex app-server side that streams events to the agent's session; (e) hybrid (use codex hooks for in-session triggers, channels for cross-session). (5) Recommendation with rationale; identify the smallest-viable subset that covers the 4 use cases. (6) Surface to operator before committing follow-up implementation tasks. NO CODE \u2014 design only. The output doc IS the deliverable."`}},{id:"native-agent-parity",scope:"codexu",phase:"shipped",status:"ok",lastTouchedAt:"2026-05-14T08:00:00Z",kanbanCards:[],command:{name:"native-agent-parity",descriptionHtml:`Research codex parity with Claude Code's native subagents \xB7 doc <a href="native-agent-parity.md">native-agent-parity.md</a> \xB7 3 follow-ups recommended (explorer, plan, verification)`,warnings:[],planPrompt:"/plan-with-ralph \"Research whether (and how) we want codex parity with Claude Code's native subagent palette \u2014 e.g., Explore (fast codebase exploration), Plan (architect), claude-code-guide, statusline-setup, etc. Today codex's [agents.<role>] TOML system is operator-defined; Claude Code ships preset subagent types with curated system prompts. Output: plans/native-agent-parity.md covering: (1) Enumerate Claude Code's preset subagents \u2014 use the Agent tool yourself if accessible to list them, or grep C:/harness-efforts/claude-code/worktrees/main/ for the subagent registry. For each: name, purpose, tool allowlist, model preference, system prompt. (2) For each, assess whether it makes sense for codex too: high-value port (e.g., Explore \u2014 every developer benefits from a fast codebase-explorer subagent) vs Claude-specific (e.g., claude-code-guide \u2014 references Claude Code features that may not apply). (3) Implementation packaging \u2014 should codex parity ship as: (a) a plugin in packages/codexu-plugin/ that registers default [agents.<role>] entries; (b) an overlay crate in codex/codex-rs-overlay/ that bakes them into the binary; (c) a one-time `codex agent install --preset claude-code-equivalents` migration. Discuss tradeoffs. (4) Should we LEVERAGE Claude Code's system prompts as inspiration? Yes \u2014 they're battle-tested. Should we copy verbatim (license / attribution question \u2014 check Claude Code's license) or paraphrase? Recommend. (5) Cross-reference Phase 3b-i (subagents \u2192 [agents.<role>] for ralph's 12 internal subagents) \u2014 that's the analogous port but operator-private; this is the public-facing 'native palette' port. (6) Pick top 3 most-valuable to port first. NO CODE \u2014 research + decision doc. Surface recommendations to operator before opening follow-up implementation tasks.\""},planOnly:!0},{id:"roadmap-plugin",scope:"bookkeeping|codexu",phase:"plan-ready",status:"ok",lastTouchedAt:"2026-05-14T05:00:00Z",kanbanCards:[{column:"soon",cardClass:null,inlineStyle:null,html:`

      <div class="card-meta">
        <span class="pill area-multi">manual</span>
        <span>~15 min</span>
      </div>
    `,order:120}],command:{name:"roadmap-plugin",descriptionHtml:"\u{1F6E0} Plugin: agents manage roadmap/overview.html via skill or MCP (add/update/take tasks)",warnings:[],planPrompt:`/plan-with-ralph "Build a plugin that lets agents manage the codexu roadmap (plans/overview-data.js + plans/parallel-assignments.md + plans/codexu-roadmap.md) programmatically. Plugin home: packages/codexu-plugin/.

TWO INTERFACE SURFACES \u2014 surface design choice to operator before scoping the build:

1. Skill commands (lower overhead, easier first version). Slash commands like /roadmap-add-task, /roadmap-update-status, /roadmap-record-run, /roadmap-take-task. Implementation: SKILL.md files under packages/codexu-plugin/skills/roadmap/. Each skill is a procedure the agent follows that reads/edits plans/overview-data.js (OVERVIEW_DATA.tasks[], OVERVIEW_DATA.runs[], OVERVIEW_DATA.lastTouched[id], etc.) + plans/parallel-assignments.md's status table. Reuses the existing .agents/skills/roadmap-and-overview/SKILL.md as the data-model reference (it documents the data schema + update procedures exhaustively).

2. MCP server (richer, agent-callable without slash commands). Stdio MCP server registered via packages/codexu-plugin/.codex-plugin/plugin.json's mcp_servers field. Tools exposed: roadmap.list, roadmap.addTask, roadmap.updateStatus, roadmap.recordRun, roadmap.takeTask. Server lives in packages/codexu-plugin/mcp-roadmap/ (new Node/TS subdir; can reuse @slopus/happy-wire for any shared types).

CORE OPERATIONS (regardless of surface):
- add-task: takes task metadata (id, status, workstream, sizeBucket, risk, effort, cadence?, ralphCommand string, optional blockedOn list). Appends a new task object to OVERVIEW_DATA.tasks[] in plans/overview-data.js + new lettered section in plans/parallel-assignments.md. Validates against the data model documented in .agents/skills/roadmap-and-overview/SKILL.md.
- update-status: takes (taskId, newStatus, optional commit sha + summary if flipping to closed). Finds the task by id in OVERVIEW_DATA.tasks[] and updates its status field; updates OVERVIEW_DATA.lastTouched[taskId]; updates parallel-assignments.md status table cell; if status='closed' appends a run record to OVERVIEW_DATA.runs[].
- record-run: takes (taskId, ranAt ISO, outcome, commits[], summary). Appends to OVERVIEW_DATA.runs[]. If task is periodic, recomputes OVERVIEW_DATA.periodic[taskId].lastRunId + nextDueAt.
- take-task: spawns a top-level agent session running the task's ralph command, then calls update-status to flip the task to in-progress. Spawn integration: call happy-cli's existing spawn-happy-session RPC. The MCP server (which runs as a stdio child of codex) needs to reach the daemon \u2014 via daemon's HTTP control surface at 127.0.0.1:<httpPort> (read from ~/.happy/daemon.state.json) OR via the daemon's existing socket. Surface this integration choice to operator.

DEPENDENCIES / CROSS-REFERENCES:
- READ .agents/skills/roadmap-and-overview/SKILL.md FIRST \u2014 it's the canonical data-model + per-operation procedure documentation. The plugin should automate exactly what that skill describes manually.
- Read packages/codexu-plugin/README.md + Phase 1c scaffolding for the plugin layout.
- For MCP transport: stdio MCP. Codex's MCP client docs in codex/external/repos/codex-patched/codex-rs/core/src/mcp_tool_call.rs (READ-ONLY per minimize-conflict-surface).
- For task-taking spawn: packages/happy-cli/src/daemon/run.ts:spawnSession (daemon-side handler) + packages/happy-cli/src/api/apiMachine.ts (apiMachineClient with spawn-happy-session RPC method registration).
- OVERLAPS WITH agent-comms: agent-comms's Scope B (same-daemon spawn/message) covers similar ground. Coordinate to avoid duplicating the spawn surface \u2014 this plugin can ship v1 using existing happy-cli RPCs without waiting for agent-comms; agent-comms can later subsume or refactor the spawn integration.

ACCEPTANCE v1 (skill-only):
- /roadmap-add-task with full metadata appends a new task to plans/overview-data.js and the operator sees it on reload.
- /roadmap-update-status flips a task's status in OVERVIEW_DATA.tasks[] + updates parallel-assignments.md status table cell + OVERVIEW_DATA.lastTouched.
- /roadmap-record-run appends a run to OVERVIEW_DATA.runs[] + updates periodic metadata if applicable.
- /roadmap-take-task spawns a happy session with the ralph command and flips the task to in-progress.
- The 4 skills are documented in packages/codexu-plugin/skills/roadmap/*/SKILL.md.

    `,order:80}],command:{name:"codex-slash-commands",descriptionHtml:"Gap 5 \u2014 `/clear` and `/compact` parity on the codex path. Spawned by <code>codex-parity-audit</code>.",warnings:[{className:"cmd-warn blocked",html:"\u{1F512} Blocked on <code>codex-hooks-parity</code> \u2014 Gap 5's <code>/compact</code> handling depends on Gap 4's auto-compact context-boundary emission so the manual <code>/compact</code> also fires <code>sendContextBoundary({ kind:'compact', triggeredBy:'user' })</code>."}],planPrompt:`/plan-with-ralph "Gap 5 from plans/codex-agent-parity-audit.md \u2014 /clear and /compact parity on the codex path. Today packages/happy-cli/src/codex/runCodex.ts:280-334 pushes the user message text into messageQueue with NO slash-command parsing \u2014 parseSpecialCommand (shared with the Claude path at runClaude.ts:541-577) is never imported on the codex side. Even if a user types /compact on a codex session, codex-core sees the literal string and codex-core's own slash-command handling may or may not fire. Codex's wire surface supports compact via NewConversationParams.compactPrompt (codexAppServerTypes.ts:29) but client.startThread (codexAppServerClient.ts) never sets it. PREREQUISITE: codex-hooks-parity (Gap 4) must have landed so the auto-compact context-boundary emission is in place \u2014 manual /compact should also fire sendContextBoundary({ kind:'compact', triggeredBy:'user' }) to keep the UI signal consistent. STEP 1 spike (~30 min): does codex-core's own slash-command handling fire when the user message is /clear or /compact? If YES \u2192 document + add a smoke test; pure happy-cli passthrough is fine. If NO \u2192 STEP 2: implement happy-cli-side interception via parseSpecialCommand (shared with Claude) \u2014 on /clear call client.disconnect() + start a fresh thread (verify with codex maintainer that this is intended UX); on /compact plumb a codex-side compact RPC if one exists, OR set compactPrompt on the NEXT startThread / similar. Also han tly ignored (runCodex.ts:287-294); the local CLI flag path falls into the defensive branch in executionPolicy.ts:24,39 returning untrusted+workspace-write. There is no ExitPlanMode codex tool. PREREQUISITE (operator-gated): confirm v1 scope is option (a) DEFENSIVE \u2014 map `plan` \u2192 codex `read-only` sandbox in executionPolicy.ts, AND emit a UI hint (session-event 'message') on first plan-mode entry: 'Plan mode on codex is approximated as read-only; ExitPlanMode tool is not available.' If operator wants option (b) overlay-crate full parity instead, defer this task and open a separate `codex-plan-mode-overlay` ralph command that lands an overlay crate codex/codex-rs-overlay/codex-plan-mode/ providing real plan-mode parity (model gets an exit_plan_mode tool, mode transitions on tool call) \u2014 spike upstream codex's tool-registration seam first. Acceptance for v1 (a): switching a codex session to plan mode results in sandbox: read-only, approvalPolicy: never, and the user sees the explanatory message; the existing mobile-UI plan-mode badge still renders correctly. Cross-package typecheck green. Test command: pnpm --filter '{packages/happy-cli}' exec vitest run 2>&1 | tee /tmp/codexu-plan-mode.log. Single commit referencing audit Gap 6. Update plans/codex-agent-parity-audit.md Gap 6 section to mark v1-defensive shipped; flag v2-overlay as still deferred. Workflow: codexu worktree at .worktrees/codex-plan-mode-defensive/ on topic branch ralph/codex-plan-mode-defensive off origin/main.\""}},{id:"codex-polish-lows",scope:"codexu",phase:"plan-ready",status:"ok",lastTouchedAt:"2026-05-14T17:00:00Z",kanbanCards:[],command:{name:"codex-polish-lows",descriptionHtml:"Bundle of Gaps 8/9/11/12 (tool gating partial + codex-args passthrough + statusline + SDK init-metadata mirror). Spawned by <code>codex-parity-audit</code>.",warnings:[{className:"cmd-warn",html:"\u26A0\uFE0F Best to land after the bigger codex-* parity follow-ups (mcp-discovery, codex-claude-md-autoload, codex-system-prompts, codex-hooks-parity) so this bundles cleanly without rebase churn. Conflicts with anything else touching <code>runCodex.ts</code>."}],planPrompt:`/plan-with-ralph "Bundle the 4 Low-severity codex-parity gaps from plans/codex-agent-parity-audit.md into a single polish PR. The audit recommended this packaging explicitly: '8. Gaps 8, 9, 11, 12 are all small and can land in a single polish PR if desired.' One commit per gap so each can be reverted independently.

GAP 8 \u2014 codex-tool-gating-partial. Track allowedTools/disallowedTools in codex EnhancedMode (runCodex.ts:96-100, currently restricted to { permissionMode, model, thinkingLevel }); at startThread, filter the mcpServers entries (whole-server granularity \u2014 drop entries whose tools are entirely disallowed). True per-tool-within-server filtering deferred to a follow-up overlay crate.

GAP 9 \u2014 codex-args-passthrough. Add repeatable --codex-arg <flag> to packages/happy-cli/src/codex/cliArgs.ts (alongside existing --effort, --model, --permission-mode, --codex-transport, --resume). Forward to the \`codex app-server\` spawn argv. Power-user escape hatch \u2014 document in packages/happy-cli/CLAUDE.md that structured flags are preferred.

GAP 11 \u2014 codex-statusline-metadata-mirror. Extend the metadata-merge in both runCodex.ts:796-800 AND resumeExistingThread.ts to include model, modelProvider, approvalPolicy, sandbox, reasoningEffort from NewConversationResponse / ResumeConversationResponse (codexAppServerTypes.ts:35-47) \u2014 currently only codexThreadId is written. Match the Claude side's mergeSDKInitMetadata semantics.

GAP 12 \u2014 codex-sdk-init-metadata-mirror. Investigate the codex initialize RPC's full response shape (server capabilities, available tools, slash commands) and propagate those into Session.metadata so the mobile app can render them. Likely a small extension of the metadata-merge from Gap 11.

CONFLICT WARNING: all 4 gaps touch runCodex.ts and/or resumeExistingThread.ts \u2014 sequence after mcp-discovery / codex-claude-md-autoload / codex-system-prompts / codex-hooks-parity have landed to avoid rebase churn. Workflow: codexu worktree at .worktrees/codex-polish-lows/ on topic branch ralph/codex-polish-lows off origin/main. 4 commits (one per gap), all referencing the corresponding audit-doc section. Cross-package typecheck green. Each gap has its own acceptance test. Update plans/codex-agent-parity-audit.md Gap 8/9/11/12 sections to mark shipped."`}},{id:"mcp-server-notifications",scope:"codex",phase:"plan-ready",status:"ok",lastTouchedAt:"2026-05-14T09:00:00Z",kanbanCards:[],command:{name:"mcp-server-notifications",descriptionHtml:"Stage A: bridge rmcp notification handlers + sampling into codex agent event loop, feature-gated. Spawned by <code>channels-research</code>.",warnings:[],planPrompt:`/plan-with-ralph "Plumb MCP server-initiated notifications (progress, cancelled, resources/updated, resources/list_changed, tools/list_changed, prompts/list_changed, message) AND sampling/createMessage into the codex agent event loop. Today codex's rmcp-client (codex/external/repos/codex-patched/codex-rs/rmcp-client/) decodes every one of these but the handlers in src/logging_client_handler.rs:49-135 are tracing-only \u2014 they never reach the agent. The elicitation path at codex/external/repos/codex-patched/codex-rs/codex-mcp/src/elicitation.rs:103-231 is the working precedent: emit Event { msg: EventMsg::\u2026 } over the tx_event: Sender<Event> sink that's already wired in at codex/external/repos/codex-patched/codex-rs/codex-mcp/src/connection_manager.rs:175. READ-ONLY on codex/external/repos/codex-patched/ per minimize-conflict-surface tenet (plans/codexu-roadmap.md:190-228); prefer a new overlay crate at codex/codex-rs-overlay/codex-mcp-bridge/ for the NotificationBridge struct + EventMsg additions; accept minimal sandbox-patch seams in logging_client_handler.rs (~12 lines additive) and elicitation_client_service.rs (~30 lines for sampling/createMessage). Add a new Feature::McpServerNotifications gate (default off). Add an invariant test under codex/codex-rs-overlay/codex-invariant-tests/ asserting the bridge is off by default. Bump codex-protocol with new EventMsg variants (McpServerNotification, McpSamplingRequest). Effort estimate per plans/channels-research.md \xA76.5: ~3-5 d wall. Read plans/channels-research.md FIRST \u2014 it has the full file:line map, the overlay-vs-inline decision, and the risk surface. Surface the overlay-vs-inline-patch shape choice to operator BEFORE landing code."`}},{id:"codex-channels",scope:"codex",phase:"plan-ready",status:"blocked",lastTouchedAt:"2026-05-14T09:00:00Z",kanbanCards:[],command:{name:"codex-channels",descriptionHtml:'Stage B: Claude-Code-parity <code>experimental["codex/channel"]</code> envelope + prompt-queue policy. Spawned by <code>channels-research</code>.',warnings:[{className:"cmd-warn blocked",html:"\u{1F512} Deferred. Blocked on <code>mcp-server-notifications</code> landing AND on operator deciding whether channels (external-user-message envelope) are the right primitive vs raw notifications (which cover state-change push perfectly without the channels framing)."}],planPrompt:`/plan-with-ralph "Design + implement Claude-Code-parity 'channels' on top of mcp-server-notifications: capability key experimental['codex/channel'] advertised by participating MCP servers, notification methods notifications/codex/channel and notifications/codex/channel/permission mirroring Claude Code's wire shape at D:/harness-efforts/claude-code/worktrees/main/src/services/mcp/channelNotification.ts:37-316. Agent-loop policy: when a channel message arrives between turns, enqueue as a prompt with priority:'next' semantics; when one arrives during an LLM call, buffer until the call completes (matches Claude Code's non-preemption behaviour). Permission half is out of scope for first cut \u20
