apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

// Mirror the variant -> package-id mapping in `app.config.js` so that
// raw `./gradlew bundleRelease` (i.e. without `expo run:android`
// regenerating the manifest) picks up the correct production
// applicationId. Without this, the AAB ships under the dev variant id
// and Play Store rejects the upload.
def appEnv = (System.getenv('APP_ENV') ?: 'development')
def appPackageByEnv = [
    development: 'com.slopus.happy.dev',
    preview    : 'com.slopus.happy.preview',
    production : 'com.evyatar109.happy',
]
def appPackage = appPackageByEnv[appEnv] ?: appPackageByEnv['development']

def appLabelByEnv = [
    development: 'Happy (dev)',
    preview    : 'Happy (preview)',
    production : 'Happy',
]
def appLabel = appLabelByEnv[appEnv] ?: appLabelByEnv['development']

// Guard against silent footguns:
// - Raw `./gradlew assembleRelease` without `APP_ENV=production` would
//   produce a release APK under the dev applicationId. Block that.
// - A production release without `keystore.properties` would silently
//   sign with the debug key, Firebase would distribute it, and existing
//   tablet installs would reject the next update with
//   INSTALL_FAILED_UPDATE_INCOMPATIBLE on signature mismatch.
def isReleaseBuild = gradle.startParameter.taskNames.any {
    it.toLowerCase().contains('release')
}
if (isReleaseBuild) {
    if (appEnv == 'development') {
        throw new GradleException(
            "APP_ENV must be set to 'production' or 'preview' for release builds. " +
            "Got 'development' (default). Set APP_ENV=production before running ./gradlew."
        )
    }
    if (appEnv == 'production' && !keystoreProperties['RELEASE_STORE_FILE']) {
        throw new GradleException(
            "Production release requires android/keystore.properties with RELEASE_STORE_FILE. " +
            "Without it, Gradle would silently sign the APK with the debug keystore. " +
            "See .agents/skills/happy-app-playstore-release/SKILL.md prerequisites."
        )
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    // Wrap @expo/cli so that --entry-file is absolutized before Metro
    // resolves it. Required on Windows because the RN Gradle plugin's
    // `File.cliPath(base)` returns a relative path on Windows, which
    // Metro mis-resolves on this pnpm-workspace layout.
    cliFile = file("${projectRoot}/scripts/expo-embed-wrapper.cjs")
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true in release builds to optimize the app using [R8](https://developer.android.com/topic/performance/app-optimization/enable-app-optimization).
 */
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // namespace controls the package of BuildConfig + R classes — must stay
    // aligned with the Kotlin source's `package` declaration in MainActivity.kt
    // / MainApplication.kt (com.slopus.happy.dev). Decoupled from
    // applicationId which is the install identity and varies by APP_ENV.
    namespace 'com.slopus.happy.dev'
    defaultConfig {
        applicationId appPackage
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode = (findProperty('VERSION_CODE') ?: '1').toInteger()
        versionName = findProperty('VERSION_NAME') ?: '1.7.0'

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""

        resValue "string", "app_name", appLabel
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (keystoreProperties['RELEASE_STORE_FILE']) {
                storeFile file(keystoreProperties['RELEASE_STORE_FILE'])
                storePassword keystoreProperties['RELEASE_STORE_PASSWORD']
                keyAlias keystoreProperties['RELEASE_KEY_ALIAS']
                keyPassword keystoreProperties['RELEASE_KEY_PASSWORD']
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig keystoreProperties['RELEASE_STORE_FILE'] ? signingConfigs.release : signingConfigs.debug
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
        }
    }
    packagingOptions {
        jniLibs {
            def enableLegacyPackaging = findProperty('expo.useLegacyPackaging') ?: 'false'
            useLegacyPackaging enableLegacyPackaging.toBoolean()
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
    // Move CMake intermediate files to a short path (Windows MAX_PATH=260
    // workaround). Without this, the C++ codegen output paths for modules
    // like react-native-enriched blow past 260 chars and ninja stat() fails.
    externalNativeBuild {
        cmake {
            // Native module CMake intermediates can total 2-5 GB across
            // skia/reanimated/enriched/etc; keep them off the C: system
            // drive (per memory `drive_preferences.md`). The short
            // top-level prefix is also what makes ninja stat() pass on
            // Windows MAX_PATH (~260) — the embedded source path
            // `D_/harness-efforts/happy/...` would otherwise overflow.
            // Override with -PcmakeBuildStaging=<path> or env CMAKE_BUILD_STAGING.
            def cmakeStagingDir = (
                findProperty('cmakeBuildStaging') ?:
                System.getenv('CMAKE_BUILD_STAGING') ?:
                'D:/cxb'
            )
            buildStagingDirectory file("${cmakeStagingDir}/${rootProject.name}-${project.name}")
        }
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Apply Firebase google-services plugin only for production builds.
// `google-services.json` only registers `com.evyatar109.happy` (the
// production package id); dev/preview applicationIds aren't in the
// personal Firebase project, so the plugin would fail
// processDebugGoogleServices with "No matching client found for
// package name 'com.slopus.happy.dev'". Dev/preview also don't need
// Firebase services for the Metro+adb iterate loop. To re-enable for
// all variants, register com.slopus.happy.dev + com.slopus.happy.preview
// in the personal Firebase project, re-download google-services.json,
// and remove this guard.
if (appEnv == 'production') {
    apply plugin: 'com.google.gms.google-services'
}